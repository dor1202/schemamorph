<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Rounded square tile background -->
  <rect width="32" height="32" rx="7" fill="url(#g)"/>
  <!-- Back card (40% opacity) — rotated, showing hexagon outline -->
  <g opacity="0.4" transform="translate(16,16) rotate(-18) translate(-16,-16)">
    <rect x="9" y="8" width="14" height="16" rx="3" fill="none" stroke="white" stroke-width="1.8"/>
    <!-- Hexagon outline inside back card -->
    <polygon points="16,11 19,13 19,17 16,19 13,17 13,13" fill="none" stroke="white" stroke-width="1.2"/>
  </g>
  <!-- Front card (solid) — slightly offset, showing DB cylinder -->
  <g transform="translate(16,16) rotate(8) translate(-16,-16)">
    <rect x="10" y="8" width="13" height="16" rx="3" fill="none" stroke="white" stroke-width="2"/>
    <!-- Tiny DB cylinder inside front card -->
    <ellipse cx="16.5" cy="13" rx="4" ry="1.5" fill="none" stroke="white" stroke-width="1.5"/>
    <line x1="12.5" y1="13" x2="12.5" y2="18" stroke="white" stroke-width="1.5"/>
    <line x1="20.5" y1="13" x2="20.5" y2="18" stroke="white" stroke-width="1.5"/>
    <ellipse cx="16.5" cy="18" rx="4" ry="1.5" fill="none" stroke="white" stroke-width="1.5"/>
  </g>
</svg>
