<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 40" width="190" height="40">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Mark: rounded square tile -->
  <rect x="0" y="4" width="32" height="32" rx="7" fill="url(#g)"/>
  <!-- Back card (40% opacity) — rotated, hexagon outline -->
  <g opacity="0.4" transform="translate(16,20) rotate(-18) translate(-16,-20)">
    <rect x="9" y="12" width="14" height="16" rx="3" fill="none" stroke="white" stroke-width="1.8"/>
    <polygon points="16,15 19,17 19,21 16,23 13,21 13,17" fill="none" stroke="white" stroke-width="1.2"/>
  </g>
  <!-- Front card (solid) — DB cylinder -->
  <g transform="translate(16,20) rotate(8) translate(-16,-20)">
    <rect x="10" y="12" width="13" height="16" rx="3" fill="none" stroke="white" stroke-width="2"/>
    <ellipse cx="16.5" cy="17" rx="4" ry="1.5" fill="none" stroke="white" stroke-width="1.5"/>
    <line x1="12.5" y1="17" x2="12.5" y2="22" stroke="white" stroke-width="1.5"/>
    <line x1="20.5" y1="17" x2="20.5" y2="22" stroke="white" stroke-width="1.5"/>
    <ellipse cx="16.5" cy="22" rx="4" ry="1.5" fill="none" stroke="white" stroke-width="1.5"/>
  </g>
  <!-- Wordmark -->
  <text x="40" y="26" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="600" fill="white" letter-spacing="-0.3">SchemaMorph</text>
</svg>
